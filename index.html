function calcR(t){
  if(!t.entryPrice||!t.stopLoss||!t.exitPrice)return null;
  const e=+t.entryPrice,sl=+t.stopLoss,ex=+t.exitPrice,d=Math.abs(e-sl);
  if(!d)return null;
  return t.direction==="Long"?(ex-e)/d:(e-ex)/d;
}
function calcPlannedR(t){
  if(!t.entryPrice||!t.stopLoss||!t.target)return null;
  const e=+t.entryPrice,sl=+t.stopLoss,tg=+t.target,d=Math.abs(e-sl);
  if(!d)return null;
  return t.direction==="Long"?(tg-e)/d:(e-tg)/d;
}
function calcPL(t){
  if(!t.entryPrice||!t.exitPrice||!t.positionSize||!t.symbol)return null;
  const p=PIP[t.symbol];if(!p)return null;
  const diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return+t.positionSize*diff*p.f*p.pv;
}
function calcRisk(t){
  if(!t.entryPrice||!t.stopLoss||!t.positionSize||!t.symbol)return null;
  const p=PIP[t.symbol];if(!p)return null;
  return+t.positionSize*Math.abs(+t.entryPrice-+t.stopLoss)*p.f*p.pv;
}
function calcPips(t){
  if(!t.entryPrice||!t.exitPrice||!t.symbol)return null;
  const p=PIP[t.symbol];if(!p)return null;
  const diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return Math.round(diff*p.f*10)/10;
}
function calcDur(t){
  if(!t.entryTime||!t.exitTime||!t.date)return null;
  try{
    const d=Math.abs(new Date(t.date+"T"+t.exitTime)-new Date(t.date+"T"+t.entryTime));
    return Math.floor(d/3600000)+"h "+Math.floor((d%3600000)/60000)+"m";
  }catch{return null;}
}
function outcome(r){if(r===null)return"";return r>0.2?"Green":r<-0.2?"Red":"Breakeven";}

function enrich(trades,cap){
  let run=cap;
  return trades.map((t,i)=>{
    const r=calcR(t),pl=calcPL(t),rv=calcRisk(t),comm=t.commission?+t.commission:0;
    const netPL=pl!==null?pl-comm:null;
    const capital=run;
    if(netPL!==null)run+=netPL;
    return{...t,_i:i+1,_r:r,_pips:calcPips(t),_pl:pl,_netPL:netPL,_rv:rv,
      _rPct:rv&&capital?rv/capital:null,_plannedR:calcPlannedR(t),
      _outcome:outcome(r),_capital:capital,_plPct:pl&&capital?pl/capital:null,
      _rExcl:r!==null&&rv&&rv!==0?r-comm/rv:null,_dur:calcDur(t)};
  });
}

function aggG(ts){
  const n=ts.length,green=ts.filter(t=>t._outcome==="Green").length,red=ts.filter(t=>t._outcome==="Red").length,be=ts.filter(t=>t._outcome==="Breakeven").length;
  const d=green+red,wr=d>0?green/d:null;
  const totalR=ts.reduce((s,t)=>s+(t._r||0),0),pl=ts.reduce((s,t)=>s+(t._pl||0),0),netPL=ts.reduce((s,t)=>s+(t._netPL||0),0);
  const avgR=n>0?totalR/n:null;
  return{n,green,red,be,wr,totalR,avgR,pl,netPL};
}

      React.createElement("div",{style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:22,width:320}},
        React.createElement("div",{style:{fontWeight:700,fontSize:14,color:"#fff",marginBottom:14}},"Settings"),
        React.createElement(FF,{label:"Starting Capital ($)"},React.createElement(Inp,{value:capInp,onChange:setCapInp,type:"number",placeholder:"10000"})),
        React.createElement("div",{style:{color:C.dim,fontSize:10,marginBottom:14}},"Used to calculate Risk %, Reward % and running Capital per trade."),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("button",{onClick:saveSettings,style:{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer",flex:1}},"Save"),
          React.createElement("button",{onClick:()=>setShowSettings(false),style:{background:C.border,color:C.text,border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,cursor:"pointer"}},"Cancel")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
