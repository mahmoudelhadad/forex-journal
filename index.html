function initApp() {

var e=R.createElement;

var LISTS={
  Symbol:["US100","US500","US30","XAU/USD","EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","USD/CHF","NZD/USD","EUR/GBP","EUR/JPY","GBP/JPY","EUR/AUD","GBP/AUD","AUD/JPY","CAD/JPY"],

  Account:["EVAL","Funded","Back Test","Demo","Real"],
  DailySetup:["Po3","AMD","SMT","50% Fib"],
  Liquidity:["LN","AS","NY","Swing H/L","5M FVG","15M FVG","1H FVG","PDH/L","DH/L","PWH/L"],
  EntrySetup:["FVG","BO","IFVG","OB","MB"],
  IntraDaySetup:["MSS","IFVG","MSB"],
  IntraDayTF:["1M","2M","3M","5M","15M","30S","15S"],

var PIP={
  "US100":{f:1,pv:1},"US500":{f:1,pv:5},"US30":{f:1,pv:5},
  "XAU/USD":{f:100,pv:10},"EUR/USD":{f:10000,pv:10},"GBP/USD":{f:10000,pv:10},
  "USD/JPY":{f:100,pv:9.3},"AUD/USD":{f:10000,pv:10},"USD/CAD":{f:10000,pv:10},
  "USD/CHF":{f:10000,pv:10},"NZD/USD":{f:10000,pv:10},"EUR/GBP":{f:10000,pv:13},
  "EUR/JPY":{f:100,pv:9.3},"GBP/JPY":{f:100,pv:9.3},"EUR/AUD":{f:10000,pv:10},
  "GBP/AUD":{f:10000,pv:10},"AUD/JPY":{f:100,pv:9.3},"CAD/JPY":{f:100,pv:9.3},
};
var C={bg:"#0D1421",card:"#111D2E",row:"#1A2535",rowAlt:"#152030",border:"#243350",
  text:"#C8D6E8",dim:"#6B82A0",white:"#FFFFFF",
  blue:"#3B82F6",green:"#22C55E",red:"#EF4444",gold:"#F59E0B",purple:"#8B5CF6",teal:"#14B8A6"};

// Calculations
function calcR(t){
  if(!t.entryPrice||!t.stopLoss||!t.exitPrice)return null;
  var ep=+t.entryPrice,sl=+t.stopLoss,ex=+t.exitPrice,d=Math.abs(ep-sl);
  if(!d)return null;
  return t.direction==="Long"?(ex-ep)/d:(ep-ex)/d;
}
function calcPlannedR(t){
  if(!t.entryPrice||!t.stopLoss||!t.target)return null;
  var ep=+t.entryPrice,sl=+t.stopLoss,tg=+t.target,d=Math.abs(ep-sl);
  if(!d)return null;
  return t.direction==="Long"?(tg-ep)/d:(ep-tg)/d;
}
function calcPL(t){
  if(!t.entryPrice||!t.exitPrice||!t.positionSize||!t.symbol)return null;
  var p=PIP[t.symbol]; if(!p)return null;
  var diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return +t.positionSize*diff*p.f*p.pv;
}
function calcRisk(t){
  if(!t.entryPrice||!t.stopLoss||!t.positionSize||!t.symbol)return null;
  var p=PIP[t.symbol]; if(!p)return null;
  return +t.positionSize*Math.abs(+t.entryPrice-+t.stopLoss)*p.f*p.pv;
}
function calcPips(t){
  if(!t.entryPrice||!t.exitPrice||!t.symbol)return null;
  var p=PIP[t.symbol]; if(!p)return null;
  var diff=t.direction==="Long"?+t.exitPrice-+t.entryPrice:+t.entryPrice-+t.exitPrice;
  return Math.round(diff*p.f*10)/10;
}
function calcDur(t){
  if(!t.entryTime||!t.exitTime||!t.date)return null;
  try{
    var d=Math.abs(new Date(t.date+"T"+t.exitTime)-new Date(t.date+"T"+t.entryTime));
    return Math.floor(d/3600000)+"h "+Math.floor((d%3600000)/60000)+"m";
  }catch(err){return null;}
}
function outcome(r){if(r===null)return"";return r>0.2?"Green":r<-0.2?"Red":"Breakeven";}
function oc(o){return({Green:C.green,Red:C.red,Breakeven:C.gold})[o]||C.dim;}

function enrich(trades,cap){
  var run=cap;
  return trades.map(function(t,i){
    var r=calcR(t),pl=calcPL(t),rv=calcRisk(t),comm=t.commission?+t.commission:0;
    var netPL=pl!==null?pl-comm:null;
    var capital=run;
    if(netPL!==null)run+=netPL;
    var o={};
    Object.keys(t).forEach(function(k){o[k]=t[k];});
    o._i=i+1; o._r=r; o._pips=calcPips(t); o._pl=pl; o._netPL=netPL; o._rv=rv;
    o._rPct=(rv&&capital)?rv/capital:null;
    o._plannedR=calcPlannedR(t);
    o._outcome=outcome(r);
    o._capital=capital;
    o._dur=calcDur(t);
    return o;
  });
}

var fr={
  r:function(v){return v===null?"—":(v>=0?"+":"")+v.toFixed(2)+"R";},
  pct:function(v){return v===null?"—":(v*100).toFixed(1)+"%";},
  usd:function(v){return v===null?"—":(v>=0?"+$":"-$")+Math.abs(v).toFixed(2);},
  pip:function(v){return v===null?"—":(v>=0?"+":"")+v.toFixed(1);},
};

var LS={
  get:function(k){try{var v=localStorage.getItem(k);return v?{value:v}:null;}catch(err){return null;}},
  set:function(k,v){try{localStorage.setItem(k,v);}catch(err){}},
};

// UI Atoms
function Sel(p){

function Inp(p){

// Raw Tab
function RawTab(props){
  var fst=useState(""); var fSym=fst[0],setFSym=fst[1];
  var fot=useState(""); var fOut=fot[0],setFOut=fot[1];
  var filtered=props.trades.filter(function(t){return(!fSym||t.symbol===fSym)&&(!fOut||t._outcome===fOut);});
  var hdrs=["#","Symbol","Date","Day","Session","Broker","Acct","Dir","Size","Entry","SL","Target","Exit","R","Pips","P/L","Net P/L","Plan R","Outcome","Setup","★","Plan","Risk$","Risk%","Dur","Actions"];
  return e("div",null,
    e("div",{style:{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}},
      e("button",{onClick:props.onAdd,style:{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"7px 16px",fontSize:12,fontWeight:700}},"+ Add Trade"),

      e("table",{style:{borderCollapse:"collapse",width:"100%",minWidth:1600}},
        e("thead",null,e("tr",null,hdrs.map(function(hd){return e(Th,{key:hd},hd);}))),
        e("tbody",null,
          filtered.length===0
            ?e("tr",null,e("td",{colSpan:26,style:{textAlign:"center",padding:50,color:C.dim,fontSize:14}},'No trades yet — click "+ Add Trade" to start'))

                e(Td,null,t.broker||"—"),

                e(Td,null,t.positionSize||"—"),
                e(Td,null,t.entryPrice||"—"),

                e(Td,null,t.target||"—"),
                e(Td,null,t.exitPrice||"—"),

                e(Td,{style:{color:t._netPL!==null?(t._netPL>0?C.green:C.red):C.dim}},fr.usd(t._netPL)),
                e(Td,{style:{color:C.gold}},fr.r(t._plannedR)),

                e(Td,null,t.setupType||"—"),

// Aggregation
function aggG(ts){
  var n=ts.length;
  var green=ts.filter(function(t){return t._outcome==="Green";}).length;
  var red=ts.filter(function(t){return t._outcome==="Red";}).length;
  var be=ts.filter(function(t){return t._outcome==="Breakeven";}).length;
  var d=green+red, wr=d>0?green/d:null;
  var totalR=ts.reduce(function(s,t){return s+(t._r||0);},0);
  var pl=ts.reduce(function(s,t){return s+(t._pl||0);},0);
  var netPL=ts.reduce(function(s,t){return s+(t._netPL||0);},0);
  var avgR=n>0?totalR/n:null;
  return{n:n,green:green,red:red,be:be,wr:wr,totalR:totalR,avgR:avgR,pl:pl,netPL:netPL};
}

function AggTable(props){
  var rows=props.rows; var run=0;

function getWeekStart(d){
  var dt=new Date(d+"T12:00"),day=dt.getDay(),diff=day===0?-6:1-day;
  dt.setDate(dt.getDate()+diff);
  return dt.toISOString().split("T")[0];
}

function DailyTab(props){
  var rows=useMemo(function(){
    var m={};
    props.trades.forEach(function(t){if(!t.date)return;if(!m[t.date])m[t.date]=[];m[t.date].push(t);});
    return Object.entries(m).sort(function(a,b){return a[0]>b[0]?1:-1;}).map(function(entry){
      var dn=new Date(entry[0]+"T12:00").toLocaleDateString("en",{weekday:"short"});
      var obj=aggG(entry[1]); obj.key=entry[0]+" ("+dn+")"; return obj;
    });
  },[props.trades]);
  return e("div",null,
    e("div",{style:{color:C.dim,fontSize:11,marginBottom:12}},rows.length+" trading days"),
    e(AggTable,{rows:rows,keyLabel:"Date"})
  );
}

function WeeklyTab(props){
  var rows=useMemo(function(){
    var m={};
    props.trades.forEach(function(t){if(!t.date)return;var w=getWeekStart(t.date);if(!m[w])m[w]=[];m[w].push(t);});
    return Object.entries(m).sort(function(a,b){return a[0]>b[0]?1:-1;}).map(function(entry){
      var end=new Date(entry[0]+"T12:00");end.setDate(end.getDate()+4);
      var obj=aggG(entry[1]); obj.key=entry[0]+" → "+end.toISOString().split("T")[0]; return obj;
    });
  },[props.trades]);
  return e("div",null,
    e("div",{style:{color:C.dim,fontSize:11,marginBottom:12}},rows.length+" weeks"),
    e(AggTable,{rows:rows,keyLabel:"Week"})
  );
}

function MonthlyTab(props){

    var m={};

}

          padding:"9px 14px",fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",borderRadius:"6px 6px 0 0",
          transition:"all 0.12s"
        }},t.l);
      })
    ),
    // Content
    e("div",{style:{padding:16}},
      tab==="dashboard"&&e(DashboardTab,{trades:trades,cap:cap}),
      tab==="raw"&&e(RawTab,{trades:trades,onEdit:openEdit,onDelete:delTrade,onAdd:openAdd}),
      tab==="daily"&&e(DailyTab,{trades:trades}),
      tab==="weekly"&&e(WeeklyTab,{trades:trades}),
      tab==="monthly"&&e(MonthlyTab,{trades:trades}),
      tab==="strategy"&&e(StrategyTab,{trades:trades})
    ),
    showForm&&e(TradeForm,{trade:editT,onSave:saveTrade,onClose:function(){setShowForm(false);setEditT(null);}}),
    showSet&&e("div",{style:{position:"fixed",inset:0,background:"#00000099",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}},
      e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:24,width:340}},
        e("div",{style:{fontWeight:700,fontSize:14,color:"#fff",marginBottom:16}},"⚙ Settings"),
        e(FF,{label:"Starting Capital ($)"},e(Inp,{value:capInp,onChange:setCapInp,type:"number",ph:"10000"})),
        e("div",{style:{color:C.dim,fontSize:10,marginBottom:16,lineHeight:1.5}},"This is used to calculate Risk %, Reward % and running capital across all trades."),
        e("div",{style:{display:"flex",gap:8}},
          e("button",{onClick:saveSets,style:{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:12,fontWeight:700,flex:1}},"Save"),
          e("button",{onClick:function(){setShowSet(false);},style:{background:C.border,color:C.text,border:"none",borderRadius:8,padding:"9px 14px",fontSize:12}},"Cancel")
        )
      )
    )
  );
}

RD.render(R.createElement(App), document.getElementById("root"));
}
</script>
</body>
</html>
